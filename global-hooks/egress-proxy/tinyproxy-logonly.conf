# tinyproxy-logonly.conf — measurement-mode variant of tinyproxy.conf (autonomy plan 5.3).
# NO Filter directives: every host is permitted but every decision is logged, so the canary
# measures real egress before the enforcement flip (Phase 7.3 — re-run setup-wsl-pipeline.sh
# with --enforce, which mounts tinyproxy.conf + egress-filter.txt instead).
# Keep Port/Listen/Log settings identical to tinyproxy.conf so the flip changes ONLY the
# filtering behavior.

Port 8888
Listen 0.0.0.0
Timeout 600

LogLevel Connect
LogFile "/var/log/tinyproxy/tinyproxy.log"

# Only the restricted Docker network reaches the proxy; do not expose it beyond that.
Allow 0.0.0.0/0
