# tinyproxy.conf — default-deny allow-list forward proxy for the pipeline egress control (EG Layer 2).
# The proxy is the ONLY route out of the restricted Docker network; FilterDefaultDeny makes it
# deny every host except those matching egress-filter.txt (generated from egress-allowlist.txt by
# build-filter.sh). Every decision is logged so egress-check.sh can surface denied attempts.

Port 8888
Listen 0.0.0.0
Timeout 600

# Default-DENY: only hosts matching the filter are permitted; everything else is blocked.
Filter "/etc/tinyproxy/egress-filter.txt"
FilterDefaultDeny Yes
FilterExtended On
# Match on the request host (URL/CONNECT target), not on client-supplied headers.
FilterURLs Off

# Log every allow/deny. Convert this to .pipeline/egress-log.jsonl for egress-check.sh — see README.
LogLevel Connect
LogFile "/var/log/tinyproxy/tinyproxy.log"

# Only the restricted Docker network reaches the proxy; do not expose it beyond that.
Allow 0.0.0.0/0
