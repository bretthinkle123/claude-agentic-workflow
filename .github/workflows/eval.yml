# eval.yml — the engine's own merge gate (PR L, Layer 1).
# Re-runs the deterministic eval harness (19 suites) on every push/PR to main, so an agent/hook/
# skill edit that silently breaks a gate can't merge — the exact promise PR H made ("CI-ready;
# PR L wires this as a job"). The harness needs only bash + jq + git (both preinstalled on
# ubuntu-latest); every .sh is LF-pinned by .gitattributes.
#
# Conventions (mirrored by the per-project template, templates/ci/pipeline-ci.yml):
#   - actions pinned by commit SHA (supply-chain: same posture as exact-pin deps)
#   - least-privilege permissions, per-ref concurrency, hard job timeout
# Branch protection making this a REQUIRED check is operator config — the checklist lives in
# global-skills/ci-conventions/SKILL.md (Layer 3).
name: eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Run the eval harness
        run: bash tests/run-eval.sh
